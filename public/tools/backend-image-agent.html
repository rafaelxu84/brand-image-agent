<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backend Image Agent</title>
    <link rel="stylesheet" href="../styles.css?v=20260602-1" />
    <style>
      .backend-shell {
        width: min(920px, 100%);
        margin: 0 auto;
        padding: 24px;
      }

      .backend-panel {
        border: 1px solid var(--line);
        background: rgba(24, 29, 23, 0.94);
        padding: 20px;
        display: grid;
        gap: 16px;
      }

      .backend-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .backend-actions a {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 14px;
        background: var(--accent);
        color: #171a12;
        font-weight: 800;
        text-decoration: none;
      }

      .backend-actions a.secondary {
        background: var(--panel-2);
        border-color: var(--line);
        color: var(--text);
      }

      code {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #10150f;
        color: var(--accent);
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main class="backend-shell">
      <section class="backend-panel">
        <div>
          <p class="eyebrow">Backend</p>
          <h1>Backend Image Agent</h1>
        </div>
        <p class="status">
          This entry opens the local backend batch console. It runs on your Mac at
          <code>http://127.0.0.1:4180/</code> after starting <code>npm run batch:gui</code>.
        </p>
        <div class="backend-actions">
          <a href="http://127.0.0.1:4180/">Open local backend agent</a>
          <a href="./" class="secondary">Tool directory</a>
          <a href="./live.html" class="secondary">Casino live</a>
          <a href="./hosted.html" class="secondary">Online delayed batch</a>
        </div>
      </section>
    </main>
  </body>
</html>
