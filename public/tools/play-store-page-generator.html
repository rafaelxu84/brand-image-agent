<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Play Store Page Generator</title>
<style>
  :root{
    --bg:#f1f3f4;
    --panel:#ffffff;
    --border:#dadce0;
    --text:#202124;
    --muted:#5f6368;
    --primary:#01875f;
    --primary-dark:#016b4d;
    --accent:#1a73e8;
    --shadow:0 1px 2px rgba(60,64,67,.1), 0 2px 6px rgba(60,64,67,.08);
    --radius:8px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:"Google Sans","Roboto","PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text);background:var(--bg)}
  button{font-family:inherit}

  /* Top bar */
  .topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:10;
  }
  .topbar h1{font-size:16px;margin:0;flex:1;font-weight:600}
  .topbar .badge{font-size:12px;color:var(--muted);background:#f1f3f4;padding:3px 8px;border-radius:10px}
  .btn{
    border:1px solid var(--border);background:#fff;color:var(--text);
    padding:7px 14px;border-radius:18px;cursor:pointer;font-size:13px;font-weight:500;
    transition:background .15s;white-space:nowrap;
  }
  .btn:hover{background:#f8f9fa}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn-primary:hover{background:var(--primary-dark)}
  .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-accent:hover{filter:brightness(.92)}
  .btn-ghost{border:none;background:transparent;color:var(--accent)}
  .btn-danger{color:#d93025}
  .btn-sm{padding:4px 10px;font-size:12px;border-radius:14px}

  /* Pages list (CMS dashboard) */
  .pages-wrap{padding:24px;height:calc(100vh - 53px);overflow:auto;background:var(--bg)}
  .pages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;max-width:1200px;margin:0 auto}
  .page-card{
    background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;
    transition:border-color .15s, box-shadow .15s;cursor:pointer;
    display:flex;flex-direction:column;gap:10px;min-height:160px;
  }
  .page-card:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .page-card-head{display:flex;align-items:flex-start;gap:10px}
  .page-card-icon{
    width:42px;height:42px;border-radius:8px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:20px;
    background:#f1f3f4;
  }
  .page-card-title{font-size:14px;font-weight:600;line-height:1.4;margin:0 0 2px;word-break:break-word}
  .page-card-meta{font-size:11px;color:var(--muted)}
  .page-card-id{
    font-family:ui-monospace,SFMono-Regular,Consolas,monospace;
    font-size:11px;color:var(--muted);background:#f8f9fa;
    padding:3px 6px;border-radius:4px;align-self:flex-start;margin-top:auto;
  }
  .page-card-actions{display:flex;gap:6px;margin-top:6px;padding-top:10px;border-top:1px solid #f1f3f4}
  .page-card-actions .btn-sm{padding:4px 10px;font-size:11px}
  .pages-empty{
    text-align:center;padding:80px 20px;color:var(--muted);
    background:#fff;border:1px dashed var(--border);border-radius:12px;
    max-width:600px;margin:40px auto;
  }
  .pages-empty h2{font-size:18px;font-weight:500;margin:0 0 8px;color:var(--text)}
  .pages-toolbar{
    max-width:1200px;margin:0 auto 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  }
  .pages-search{
    flex:1;min-width:200px;max-width:360px;
    padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;
  }
  .pages-search:focus{outline:none;border-color:var(--primary)}

  .page-name-input{
    border:1px solid transparent;background:transparent;
    padding:4px 8px;border-radius:6px;font-size:14px;font-weight:600;font-family:inherit;
    min-width:200px;flex:1;color:var(--text);
  }
  .page-name-input:hover{border-color:var(--border);background:#fff}
  .page-name-input:focus{outline:none;border-color:var(--primary);background:#fff}

  /* Layout */
  .app{display:grid;grid-template-columns:minmax(420px,500px) 1fr;height:calc(100vh - 53px)}
  .editor{
    overflow:auto;background:#fff;border-right:1px solid var(--border);
    padding:8px 0 80px;
  }
  .preview-wrap{
    overflow:auto;display:flex;justify-content:center;align-items:flex-start;
    padding:24px;background:var(--bg);
  }
  .preview{
    width:100%;max-width:760px;background:#fff;border-radius:12px;
    box-shadow:var(--shadow);overflow:hidden;
  }

  /* Editor sections */
  details.section{border-bottom:1px solid #eee}
  details.section > summary{
    list-style:none;cursor:pointer;padding:14px 18px;
    font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;
    user-select:none;
  }
  details.section > summary::-webkit-details-marker{display:none}
  details.section > summary::before{
    content:"›";display:inline-block;transition:transform .2s;color:var(--muted);font-size:18px;line-height:1;
  }
  details[open].section > summary::before{transform:rotate(90deg)}
  details.section > summary:hover{background:#fafafa}
  details.section.ai > summary{background:#f0f7ff}
  details.section.ai > summary:hover{background:#e6f1ff}
  .section-body{padding:4px 18px 18px}
  .field{display:block;margin:10px 0}
  .field > label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
  .field input[type=text],.field input[type=password],.field input[type=number],.field input[type=url],.field textarea,.field select{
    width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;
    font-size:13px;font-family:inherit;background:#fff;color:var(--text);
  }
  .field textarea{resize:vertical;min-height:70px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--primary)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .check{display:flex;align-items:center;gap:8px;font-size:13px;margin:8px 0;cursor:pointer}
  .check input{margin:0}
  .helper{font-size:12px;color:var(--muted);margin:4px 0 0}

  .item-card{
    border:1px solid #eee;border-radius:8px;padding:10px;margin:8px 0;background:#fafafa;
  }
  .item-card .item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .item-card .item-head .ttl{font-size:12px;font-weight:600;color:var(--muted)}
  .img-input{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .img-thumb{width:42px;height:42px;border-radius:6px;background:#eee;object-fit:cover;border:1px solid var(--border)}
  .img-thumb.lg{width:64px;height:64px;border-radius:14px}

  .ai-status{
    margin-top:10px;padding:10px;border-radius:8px;font-size:12px;
    background:#f8f9fa;color:var(--muted);max-height:160px;overflow:auto;
    font-family:ui-monospace,SFMono-Regular,Consolas,monospace;line-height:1.5;
    white-space:pre-wrap;display:none;
  }
  .ai-status.ok{background:#e6f4ea;color:#1e8e3e;display:block}
  .ai-status.err{background:#fce8e6;color:#c5221f;display:block}
  .ai-status.busy{background:#e8f0fe;color:#1a73e8;display:block}

  /* ============ PLAY STORE PREVIEW ============ */
  .ps{font-size:14px;color:var(--text);line-height:1.5;position:relative}

  /* Fake Play Store top navigation bar */
  .ps-topnav{
    position:sticky;top:0;left:0;right:0;z-index:50;
    background:#fff;height:56px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    border-bottom:1px solid #dadce0;
  }
  .ps-topnav-left{display:flex;align-items:center;gap:24px;flex:1;min-width:0}
  .ps-topnav-brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .ps-topnav-logo{width:28px;height:28px;flex-shrink:0}
  .ps-topnav-brand-text{font-size:18px;font-weight:500;color:#5f6368;letter-spacing:.2px}
  .ps-topnav-menu{display:flex;align-items:center;gap:24px;font-size:14px;color:#5f6368;font-weight:500;overflow:hidden}
  .ps-topnav-menu span{cursor:pointer;white-space:nowrap;padding:6px 0;position:relative}
  .ps-topnav-menu span.active{color:var(--primary)}
  .ps-topnav-menu span.active::after{
    content:"";position:absolute;left:0;right:0;bottom:-18px;height:2px;background:var(--primary);
  }
  .ps-topnav-right{display:flex;align-items:center;gap:18px;color:#5f6368;font-size:18px;flex-shrink:0}
  .ps-topnav-right .ps-topnav-icon{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%}
  .ps-topnav-right .ps-topnav-icon:hover{background:#f1f3f4}

  /* Fake Play Store bottom navigation bar */
  .ps-bottomnav{
    position:sticky;bottom:0;left:0;right:0;z-index:50;
    background:#fff;height:56px;
    display:flex;align-items:stretch;
    border-top:1px solid #dadce0;
  }
  .ps-bottomnav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-size:11px;color:#5f6368;cursor:pointer;
  }
  .ps-bottomnav-item.active{color:var(--primary)}
  .ps-bottomnav-item .ps-bottomnav-icon{font-size:20px;line-height:1}

  /* Hide menu items on narrow screens (matches real Play Store) */
  @media (max-width: 600px){
    .ps-topnav-menu{display:none}
  }

  .ps-header{padding:24px 24px 0}
  .ps-app-row{display:flex;gap:20px;align-items:flex-start}
  .ps-icon{
    width:96px;height:96px;border-radius:22px;
    background:linear-gradient(135deg,#34d399,#059669);
    flex-shrink:0;object-fit:cover;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
  }
  .ps-app-info{flex:1;min-width:0}
  .ps-app-name{font-size:24px;font-weight:600;line-height:1.2;margin:0 0 4px}
  .ps-developer{color:var(--primary);font-size:13px;font-weight:500;margin:0 0 4px}
  .ps-meta{font-size:12px;color:var(--muted)}
  .ps-meta span+span::before{content:" · ";margin:0 2px}
  .ps-stats{
    display:grid;grid-template-columns:repeat(4,1fr);
    margin:24px 24px 0;padding:16px 0;border-top:1px solid #eee;border-bottom:1px solid #eee;
    text-align:center;
  }
  .ps-stat{display:flex;flex-direction:column;align-items:center;gap:4px;border-right:1px solid #eee}
  .ps-stat:last-child{border-right:none}
  .ps-stat-val{font-size:14px;font-weight:600;display:flex;align-items:center;gap:3px}
  .ps-stat-sub{font-size:11px;color:var(--muted)}

  .ps-actions{display:flex;gap:12px;align-items:center;padding:18px 24px;flex-wrap:wrap}
  .ps-install{
    flex:1;min-width:160px;background:var(--primary);color:#fff;border:none;
    padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;
    text-decoration:none;text-align:center;display:inline-block;
  }
  .ps-install:hover{background:var(--primary-dark)}
  .ps-iconbtn{
    background:none;border:1px solid var(--border);color:var(--muted);
    width:40px;height:40px;border-radius:50%;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  }

  /* Top-of-page video hero — inline autoplay (no click) */
  .ps-hero{
    position:relative;width:100%;aspect-ratio:16/9;background:#000;
    overflow:hidden;pointer-events:none;
  }
  .ps-hero > img, .ps-hero > video, .ps-hero > iframe{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;border:0;display:block;
    pointer-events:none;
  }
  .ps-hero .ps-video-placeholder{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.65);font-size:14px;background:linear-gradient(135deg,#374151,#111827);
  }
  /* Bottom-fade scrim so the video blends into the dark card and gives the icon a clean read */
  .ps-hero::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background:linear-gradient(180deg,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0) 50%,
      rgba(0,0,0,.30) 75%,
      rgba(0,0,0,.65) 100%);
  }
  /* Subtle side vignette */
  .ps-hero::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background:linear-gradient(90deg, rgba(0,0,0,.15) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,.15) 100%);
  }
  .ps-hero .ps-video-label{
    position:absolute;left:18px;bottom:18px;z-index:2;
    background:rgba(0,0,0,.65);color:#fff;
    font-size:12px;padding:5px 10px;border-radius:4px;
    font-weight:500;letter-spacing:.4px;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  /* When a hero precedes the header, icon overlaps deep into the dark scrim */
  .ps-header.has-hero{padding-top:0;position:relative}
  .ps-icon.overlap{
    margin-top:-60px;
    box-shadow:
      0 0 0 4px #fff,
      0 6px 20px rgba(0,0,0,.28),
      0 2px 6px rgba(0,0,0,.16);
    position:relative;z-index:3;
  }

  /* ============== DARK HEADER (doit777 H5 style) ============== */
  .ps-dark-card{background:#0f1115;color:#fff;position:relative}
  .ps-dark-card .ps-hero{
    /* video bottom fades into the dark card seamlessly */
  }
  .ps-dark-card .ps-hero::before{
    /* override the gradient to fade to the exact dark-card color */
    background:linear-gradient(180deg,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0) 30%,
      rgba(15,17,21,.6) 70%,
      rgba(15,17,21,1) 100%);
  }
  .ps-dark-card .ps-header{
    background:transparent;color:#fff;padding:0 22px 0;
  }
  .ps-dark-card .ps-app-row{padding:18px 0 14px;gap:16px;align-items:center}
  .ps-dark-card .ps-icon{
    width:84px;height:84px;border-radius:18px;
    margin-top:0;
    box-shadow:0 4px 14px rgba(0,0,0,.5);
  }
  .ps-dark-card .ps-app-name{color:#fff;font-size:22px}
  .ps-dark-card .ps-developer{color:var(--accent-color, #01b574);font-size:14px;margin-bottom:2px}
  .ps-dark-card .ps-meta{color:rgba(255,255,255,.55);font-size:13px}
  .ps-dark-card .ps-meta span+span::before{content:""}
  .ps-dark-card .ps-meta span{display:block;line-height:1.5}

  .ps-dark-card .ps-stats{
    background:transparent;color:#fff;
    margin:0;padding:14px 0 16px;
    border-top:1px solid rgba(255,255,255,.08);border-bottom:none;
    grid-template-columns:1fr 1fr 1fr;
  }
  .ps-dark-card .ps-stats{margin:0 22px}
  .ps-dark-card .ps-stat{border-color:rgba(255,255,255,.08)}
  .ps-dark-card .ps-stat-val{color:#fff;font-size:15px}
  .ps-dark-card .ps-stat-val span{color:var(--accent-color, #01b574) !important}
  .ps-dark-card .ps-stat-sub{color:rgba(255,255,255,.5)}
  .ps-dark-card .ps-stat-val[data-age]{
    border:1.5px solid rgba(255,255,255,.7);
    color:rgba(255,255,255,.85);
    border-radius:3px;padding:1px 6px;font-size:12px;
  }

  .ps-dark-card .ps-actions{
    padding:16px 22px 14px;flex-direction:column;gap:0;
  }
  .ps-install-fullwidth{
    width:100%;display:block;text-align:center;
    background:var(--accent-color, #01b574);color:#fff;
    border:0;border-radius:8px;
    padding:14px;font-size:15px;font-weight:500;letter-spacing:.3px;
    cursor:pointer;
  }
  .ps-install-fullwidth:hover{filter:brightness(.92)}

  .ps-secondary{
    display:flex;justify-content:center;gap:36px;
    padding:18px 22px 8px;
  }
  .ps-secondary a{
    color:var(--accent-color, #01b574);font-size:14px;font-weight:500;
    display:inline-flex;align-items:center;gap:8px;
    text-decoration:none;cursor:pointer;
  }
  .ps-secondary .ps-sec-icon{
    width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;
    color:var(--accent-color, #01b574);
  }

  .ps-device-hint{
    color:rgba(255,255,255,.55);
    padding:14px 22px 18px;
    display:flex;align-items:center;gap:10px;
    font-size:13px;
  }
  .ps-device-hint svg{width:18px;height:18px;flex-shrink:0;opacity:.6}

  /* Floating contact widget — fixed on right side of viewport, always visible while scrolling */
  .ps-contacts-stack{
    position:fixed;right:14px;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:12px;
    z-index:99999;flex-shrink:0;
  }
  .ps-contacts-stack a{
    width:48px;height:48px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    text-decoration:none;color:#fff;
    box-shadow:0 4px 14px rgba(0,0,0,.35);
    transition:transform .15s;
  }
  .ps-contacts-stack a:hover{transform:scale(1.08)}
  .ps-contacts-stack a svg{width:24px;height:24px;fill:#fff}

  /* Video lightbox modal */
  .ps-video-modal{
    position:fixed;inset:0;background:rgba(0,0,0,.88);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;padding:24px;animation:fadeIn .15s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .ps-video-modal-inner{
    width:100%;max-width:1000px;aspect-ratio:16/9;position:relative;
    background:#000;border-radius:10px;overflow:hidden;
    box-shadow:0 8px 40px rgba(0,0,0,.5);
  }
  .ps-video-modal-inner iframe, .ps-video-modal-inner video{
    position:absolute;inset:0;width:100%;height:100%;border:0;
  }
  .ps-video-modal-close{
    position:absolute;top:-44px;right:-4px;
    width:36px;height:36px;border-radius:50%;
    background:rgba(255,255,255,.15);border:0;color:#fff;cursor:pointer;
    font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;
  }
  .ps-video-modal-close:hover{background:rgba(255,255,255,.25)}

  .ps-screenshots-wrap{position:relative}
  .ps-screenshots{
    display:flex;gap:10px;overflow-x:auto;padding:14px 24px 12px;
    scrollbar-width:none;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .ps-screenshots::-webkit-scrollbar{display:none}
  .ps-screenshot{
    height:280px;border-radius:8px;flex-shrink:0;
    background:#eee;object-fit:cover;
    box-shadow:0 1px 2px rgba(0,0,0,.06);
    scroll-snap-align:center;
  }
  /* Pagination dots */
  .ps-dots{
    display:flex;justify-content:center;gap:6px;
    padding:4px 24px 12px;
  }
  .ps-dot{
    width:6px;height:6px;border-radius:50%;
    background:#dadce0;cursor:pointer;
    transition:background .2s, width .2s, border-radius .2s;
  }
  .ps-dot.active{
    background:var(--primary);width:18px;border-radius:3px;
  }

  /* Install button — progress bar overlay */
  .ps-install,.ps-install-fullwidth{position:relative;overflow:hidden;isolation:isolate}
  .ps-install-progress{
    position:absolute;left:0;top:0;bottom:0;width:0%;
    background:rgba(255,255,255,.22);
    transition:width .08s linear;z-index:0;pointer-events:none;
  }
  .ps-install-text{position:relative;z-index:1}

  .ps-section{padding:18px 24px;border-top:1px solid #eee}
  .ps-section h2{font-size:18px;font-weight:600;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between}
  .ps-section .arrow{color:var(--muted);font-size:18px}
  .ps-about{font-size:14px;color:#3c4043;line-height:1.65;white-space:pre-wrap}
  .ps-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .ps-tag{
    border:1px solid var(--border);border-radius:14px;padding:6px 12px;
    font-size:12px;color:var(--muted);
  }
  .ps-updated{font-size:12px;color:var(--muted);margin-top:14px}

  .ps-safety-card{
    border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:8px;
  }
  .ps-safety-item{display:flex;gap:12px;align-items:flex-start;padding:8px 0}
  .ps-safety-item:not(:last-child){border-bottom:1px solid #f0f0f0}
  .ps-safety-icon{
    width:36px;height:36px;border-radius:50%;flex-shrink:0;
    background:#e8f0fe;display:flex;align-items:center;justify-content:center;
    font-size:18px;
  }
  .ps-safety-text{flex:1}
  .ps-safety-title{font-size:14px;font-weight:500;margin:0 0 2px}
  .ps-safety-desc{font-size:12px;color:var(--muted);margin:0}

  },
  "imagePrompts": {

    "screenshots": [
      { "label": "<short localized screen label>", "prompt": "<prompt for a vertical app-store screenshot mockup: screen goal, UI content, mood, color, and what NOT to include>" }

    ]
  }
}

CRITICAL:
- Return ONLY the raw JSON object. No \`\`\`json fences. No explanatory text.
- All generated copy, UI labels, review text, dates, and image prompt labels MUST be in ${s.locale.language}. Use ${s.locale.locale} conventions where helpful.
- Reviews must read as if written by real users — diverse voices, specific details, occasional minor complaints.

- Image prompt logic: derive visual direction from app name, category, theme color, icon/background, uploaded screenshots, and operator context; keep screenshots realistic as product UI mockups, keep icon simple at small sizes, and avoid misleading badges, platform logos, prices, QR codes, or install/download claims in the image itself.
- Do not generate or prompt for the game cover / hero poster. Operators upload that asset manually.`;
}

function buildImagePromptPlan(s){
  const screenSlots = (s.screenshots || []).map((sc, i) =>
    `Screenshot ${i+1} (${sc.label || "untitled"}): vertical app-store screenshot prompt based on this screen's role, target language ${s.locale.language}, app category ${s.app.category}, theme ${s.theme.primary}, and any uploaded reference image in that slot.`
  ).join("\n");
  return `IMAGE PROMPT LOGIC

- The AI returns prompts, not image files; operators can paste these prompts into the approved image-generation workflow.
- Visual direction is inferred from: app name, category, developer, target language, theme color, uploaded screenshots, current placeholder labels, icon background, and Extra context.
- App icon: 512x512, simple recognizable mark, strong silhouette, no tiny copy, no Play Store/Android/Google logos unless supplied by the operator.
- Game cover / hero poster: not generated by AI; operators upload this manually.
- Screenshots: vertical app-store style UI mockups, one coherent product story across slots, localized UI microcopy when visible, no QR codes, no misleading awards, no prices unless the operator supplied them.

Current slots:
Icon: ${s.imagePrompts.icon || "(AI will generate)"}
${screenSlots || "No screenshot slots yet."}`;
}

function buildPromptReference(s){
  return `FIELD → PROMPT MAPPING

Global inputs:
- locale.language / locale.locale → target language and regional style for every generated field.
- app.name / app.developer / app.category / theme.primary / ai.context / uploaded screenshots → source facts and visual direction.

Generated copy fields:

Button/link boundary:

- The exported template does not contain install-link, attribution, tracking, or click-reporting code.
- Another frontend/backend module should resolve the real URL for data-lp-action="${s.cta.actionKey || "install"}".`;

/* ===========================================================
   4. AI call — OpenAI / compatible
   =========================================================== */
async function callAI(){
  const status = $("#ai-status");
  const btn = $("#btn-ai-generate");
  if (!state.ai.apiKey){ flashStatus("err","API key is required."); return; }
  const missing = [];
  if (!state.app.name.trim()) missing.push("App name");
  if (!state.app.developer.trim()) missing.push("Developer");
  if (!state.app.category.trim()) missing.push("Category");
  if (missing.length){ flashStatus("err","Required before AI: " + missing.join(", ")); return; }
  status.className = "ai-status busy";
  status.textContent = "Calling model… this can take 10-30s.";
  btn.disabled = true;

  try {
    const userPrompt = buildAIUserPrompt(state);
    const imgs = state.ai.sendScreenshots
      ? state.screenshots.filter(s => s.url && s.url.startsWith("data:image")).slice(0,4)
      : [];

    const raw = await callOpenAI(userPrompt, imgs);

    const json = extractJSON(raw);
    if (!json) throw new Error("Could not parse JSON from model response. Raw output:\n\n" + raw.slice(0, 800));

    mergeAIResponse(json);
    renderEditor();
    renderPreview();
    flashStatus("ok", "Content generated and applied.");
  } catch(err){
    console.error(err);
    flashStatus("err", "Error: " + (err.message || err));
  } finally {
    btn.disabled = false;
  }
}

async function callOpenAI(userPrompt, imgs){
  const userContent = [];
  for (const img of imgs){
    userContent.push({ type:"image_url", image_url:{ url: img.url } });
  }
  userContent.push({ type:"text", text: userPrompt });

  const res = await fetch(state.ai.endpoint, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${state.ai.apiKey}`
    },
    body: JSON.stringify({
      model: OPENAI_LATEST_COPY_MODEL,
      messages: [
        { role:"system", content: AI_SYSTEM_PROMPT },
        { role:"user",   content: userContent }
      ],
      max_completion_tokens: 4096
    })
  });
  if (!res.ok){
    const t = await res.text();
    throw new Error(`API ${res.status}: ${t}`);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || "";
}

function extractJSON(raw){
  if (!raw) return null;
  // try direct parse
  try { return JSON.parse(raw); } catch(_){}
  // strip ```json fences
  const fenced = raw.match(/```(?:json)?\s*([\s\S]+?)```/);
  if (fenced){ try { return JSON.parse(fenced[1]); } catch(_){} }
  // grab first {…}
  const first = raw.indexOf("{"); const last = raw.lastIndexOf("}");
  if (first >= 0 && last > first){
    try { return JSON.parse(raw.slice(first, last+1)); } catch(_){}
  }
  return null;
}

function mergeAIResponse(json){
  // Selectively merge AI output into state — preserve user-uploaded icons/screenshots
  if (json.ui)      state.ui      = { ...state.ui,      ...json.ui };
  if (json.stats)   state.stats   = { ...state.stats,   ...json.stats };
  if (json.about)   state.about   = { ...state.about,   ...json.about };
  if (json.safety && Array.isArray(json.safety))   state.safety  = json.safety;
  if (json.ratings && json.ratings.distribution){
    state.ratings.distribution = {
      5: +json.ratings.distribution[5] || 0,
      4: +json.ratings.distribution[4] || 0,
      3: +json.ratings.distribution[3] || 0,
      2: +json.ratings.distribution[2] || 0,
      1: +json.ratings.distribution[1] || 0,
    };
  }
  if (json.reviews && Array.isArray(json.reviews))  state.reviews   = json.reviews;
  if (json.whatsnew)                                state.whatsnew  = json.whatsnew;
  if (json.info)    state.info    = { ...state.info,    ...json.info };
  if (json.imagePrompts){
    state.imagePrompts = {
      ...state.imagePrompts,
      icon: json.imagePrompts.icon || state.imagePrompts.icon,
      screenshots: Array.isArray(json.imagePrompts.screenshots)
        ? json.imagePrompts.screenshots
        : state.imagePrompts.screenshots
    };
  }
}

function flashStatus(kind,msg){
  const s = $("#ai-status");
  s.className = "ai-status " + kind;
  s.textContent = msg;
}

function setProviderDefaults(provider){
  state.ai.provider = provider === "custom" ? "custom" : "openai";
  if (state.ai.provider === "openai"){
    state.ai.endpoint = "https://api.openai.com/v1/chat/completions";
    state.ai.model = OPENAI_LATEST_COPY_MODEL;
  }
}

/* ===========================================================
   6. Editor events
   =========================================================== */
function setByPath(obj, path, value){
  const keys = path.split(".");
  let cur = obj;
  for (let i=0;i<keys.length-1;i++) cur = cur[keys[i]];
  cur[keys[keys.length-1]] = value;
}

function attachEditorEvents(){
  $$("[data-bind]").forEach(el=>{
    el.addEventListener("input", ()=>{
      const path = el.getAttribute("data-bind");
      let v = el.type === "checkbox" ? el.checked
            : el.type === "number"   ? Number(el.value)
            : el.value;
      if (el.dataset.tagArray){
        v = el.value.split(",").map(s=>s.trim()).filter(Boolean);
      }
      setByPath(state, path, v);
      if (path === "video.darkHeader" || path === "video.showDeviceHint" || path === "video.showLabel") renderEditor();
      if (path === "cta.showProgressBar" || path === "screenshotsConfig.autoplay" || path === "screenshotsConfig.showDots") renderEditor();
      if (path === "chrome.showTopNav" || path === "chrome.showBottomNav") renderEditor();
      if (path === "ai.provider") {
        setProviderDefaults(el.value);
        renderEditor();
      }
      renderPreview();
    });
  });

  const localeSelect = $("#locale-select");
  if (localeSelect){
    localeSelect.addEventListener("change", ()=>{
      applyLanguagePreset(localeSelect.value);
      renderEditor();
      renderPreview();
    });
  }

  // Icon
  const iconFile = $("#icon-file");
  if (iconFile){
    iconFile.addEventListener("change", async e=>{
      const f = e.target.files[0]; if (!f) return;
      state.app.icon = await fileToDataURL(f);
      renderEditor(); renderPreview();
    });
  }

  // Screenshots
  $$("[data-screenshot-bind]").forEach(el=>{
    el.addEventListener("input", ()=>{
      const [i,k] = el.getAttribute("data-screenshot-bind").split(".");
      state.screenshots[+i][k] = el.value;
      renderPreview();
    });
  });
  $$("[data-screenshot-file]").forEach(el=>{
    el.addEventListener("change", async e=>{
      const i = +el.getAttribute("data-screenshot-file");
      const f = e.target.files[0]; if (!f) return;
      state.screenshots[i].url = await fileToDataURL(f);
      renderEditor(); renderPreview();
    });
  });
  $$("[data-clear-screenshot]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const i = +el.getAttribute("data-clear-screenshot");
      state.screenshots[i].url = "";
      renderEditor(); renderPreview();
    });
  });
  $$("[data-remove-screenshot]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const idx = +el.getAttribute("data-remove-screenshot");
      state.screenshots.splice(idx,1);
      state.imagePrompts.screenshots.splice(idx,1);
      renderEditor(); renderPreview();
    });
  });
  if ($("#add-screenshot")) $("#add-screenshot").addEventListener("click", ()=>{
    const palette = ["#1f2937","#7c3aed","#0ea5e9","#f97316","#dc2626","#16a34a","#ec4899"];
    state.screenshots.push({url:"", color:palette[state.screenshots.length%palette.length], label:"Screenshot"});
    state.imagePrompts.screenshots.push({label:"Screenshot", prompt:""});
    renderEditor(); renderPreview();
  });

  // Image prompt fields
  $$("[data-image-prompt-bind]").forEach(el=>{
    el.addEventListener("input", ()=>{
      const [i,k] = el.getAttribute("data-image-prompt-bind").split(".");
      if (!state.imagePrompts.screenshots[+i]) state.imagePrompts.screenshots[+i] = {label:"", prompt:""};
      state.imagePrompts.screenshots[+i][k] = el.value;
    });
  });

  // Safety
  $$("[data-safety-bind]").forEach(el=>{
    el.addEventListener("input", ()=>{
      const [i,k] = el.getAttribute("data-safety-bind").split(".");
      state.safety[+i][k] = el.value;
      renderPreview();
    });
  });
  $$("[data-remove-safety]").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.safety.splice(+el.getAttribute("data-remove-safety"),1);
      renderEditor(); renderPreview();
    });
  });
  if ($("#add-safety")) $("#add-safety").addEventListener("click", ()=>{
    state.safety.push({icon:"🛡️", title:"New entry", desc:"Description"});
    renderEditor(); renderPreview();
  });

  // Reviews
  $$("[data-review-bind]").forEach(el=>{
    el.addEventListener("input", ()=>{
      const [i,k] = el.getAttribute("data-review-bind").split(".");
      let v = (k==="rating"||k==="helpful") ? Number(el.value) : el.value;
      state.reviews[+i][k] = v;
      renderPreview();
    });
  });
  $$("[data-remove-review]").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.reviews.splice(+el.getAttribute("data-remove-review"),1);
      renderEditor(); renderPreview();
    });
  });
  if ($("#add-review")) $("#add-review").addEventListener("click", ()=>{
    state.reviews.push({author:"New user", rating:5, date:"April 27, 2026", text:"Review text…", helpful:0, version:""});
    renderEditor(); renderPreview();
  });

  // Clear icon
  $$("[data-clear-img='icon']").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.app.icon=""; renderEditor(); renderPreview();
    });
  });

  // Template picker
  $$("[data-template-pick]").forEach(el=>{
    el.addEventListener("change", ()=>{
      state.template = el.value;
      renderEditor(); renderPreview();
    });
  });

  // Video poster upload
  if ($("#video-file")) {
    $("#video-file").addEventListener("change", async e=>{
      const f = e.target.files[0]; if (!f) return;
      state.video.url = await fileToDataURL(f);
      renderEditor(); renderPreview();
    });
  }
  if ($("#video-clear")) {
    $("#video-clear").addEventListener("click", ()=>{
      state.video.url = ""; renderEditor(); renderPreview();
    });
  }
  if ($("#video-poster-file")) {
    $("#video-poster-file").addEventListener("change", async e=>{
      const f = e.target.files[0]; if (!f) return;
      state.video.poster = await fileToDataURL(f);
      renderEditor(); renderPreview();
    });
  }
  if ($("#video-poster-clear")) {
    $("#video-poster-clear").addEventListener("click", ()=>{
      state.video.poster = ""; renderEditor(); renderPreview();
    });
  }

  // ── Top nav items ──
  $$("[data-topnav-bind]").forEach(el=>{
    el.addEventListener("input", ()=>{
      const [i,k] = el.getAttribute("data-topnav-bind").split(".");
      state.chrome.topNavItems[+i][k] = el.value;
      renderPreview();
    });
  });
  $$("[data-topnav-active]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const idx = +el.getAttribute("data-topnav-active");
      state.chrome.topNavItems.forEach((it,i)=>{ it.active = (i === idx); });
      renderPreview();
    });
  });
  $$("[data-remove-topnav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.chrome.topNavItems.splice(+el.getAttribute("data-remove-topnav"),1);
      renderEditor(); renderPreview();
    });
  });
  if ($("#add-topnav")) $("#add-topnav").addEventListener("click", ()=>{
    state.chrome.topNavItems.push({label:"New", active:false});
    renderEditor(); renderPreview();
  });

  // ── Bottom nav items ──
  $$("[data-bottomnav-bind]").forEach(el=>{
    el.addEventListener("input", ()=>{
      const [i,k] = el.getAttribute("data-bottomnav-bind").split(".");
      state.chrome.bottomNavItems[+i][k] = el.value;
      renderPreview();
    });
  });
  $$("[data-bottomnav-active]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const idx = +el.getAttribute("data-bottomnav-active");
      state.chrome.bottomNavItems.forEach((it,i)=>{ it.active = (i === idx); });
      renderPreview();
    });
  });
  $$("[data-remove-bottomnav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.chrome.bottomNavItems.splice(+el.getAttribute("data-remove-bottomnav"),1);
      renderEditor(); renderPreview();
    });
  });
  if ($("#add-bottomnav")) $("#add-bottomnav").addEventListener("click", ()=>{
    state.chrome.bottomNavItems.push({icon:"📦", label:"New", active:false});
    renderEditor(); renderPreview();
  });

  // Floating contacts
  $$("[data-contact-bind]").forEach(el=>{
    el.addEventListener("input", ()=>{
      const [i,k] = el.getAttribute("data-contact-bind").split(".");
      state.video.contacts[+i][k] = el.value;
      if (k === "type") renderEditor();   // switching type may toggle the icon/bg fields
      renderPreview();
    });
  });
  $$("[data-remove-contact]").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.video.contacts.splice(+el.getAttribute("data-remove-contact"), 1);
      renderEditor(); renderPreview();
    });
  });
  if ($("#add-contact")) $("#add-contact").addEventListener("click", ()=>{
    const used = state.video.contacts.map(c=>c.type);
    const next = !used.includes("telegram") ? "telegram"
               : !used.includes("whatsapp") ? "whatsapp"
               : "custom";
    state.video.contacts.push({type: next, url: ""});
    renderEditor(); renderPreview();
  });

  // AI buttons
  if ($("#btn-ai-generate")) $("#btn-ai-generate").addEventListener("click", callAI);
  if ($("#btn-ai-show-prompt")) $("#btn-ai-show-prompt").addEventListener("click", ()=>{
    const s = $("#ai-status");
    s.className = "ai-status busy";
    s.textContent = buildPromptReference(state) + "\n\n" + buildImagePromptPlan(state) + "\n\nSYSTEM:\n" + AI_SYSTEM_PROMPT + "\n\nUSER:\n" + buildAIUserPrompt(state);
  });
}

/* ===========================================================
   7. Preview + standalone export
   =========================================================== */
function buildPreviewHTML(s, isStandalone=false){
  const ui = { ...DEFAULT_STATE.ui, ...(s.ui || {}) };
  const initials = s.app.name.trim().slice(0,2).toUpperCase();
  const dist = s.ratings.distribution;
  const maxBar = Math.max(dist[5],dist[4],dist[3],dist[2],dist[1],1);

  const iconStyle = s.app.icon
    ? `background-image:url('${s.app.icon}');background-size:cover;background-position:center;`
    : `background:${s.app.iconBg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:600;`;

  // Install button: in editor we use a no-op, in standalone we wire up real behavior
  const ctaLabel = `${escapeHtml(s.cta.installText)}${s.cta.price?` · ${escapeHtml(s.cta.price)}`:""}`;
  const ctaDataAttrs = s.cta.showProgressBar
    ? `data-progress="1" data-progress-ms="${s.cta.progressDuration||1600}" data-progress-text="${escapeHtml(s.cta.progressText||'')}"`
    : "";
  const actionAttr = `data-lp-action="${escapeHtml(s.cta.actionKey || 'install')}"`;

function buildLightBody(s){

  <div class="ps-screenshots-wrap">
    <div class="ps-screenshots" data-autoplay="${carousel.autoplay?1:0}" data-autoplay-ms="${carousel.autoplayInterval||4000}">
      ${s.screenshots.map(sc=>{
        if (sc.url) return `<img class="ps-screenshot" src="${sc.url}" alt="${escapeHtml(sc.label||'')}">`;
        return `<div class="ps-screenshot" style="width:160px;background:${sc.color||'#ccc'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500;font-size:14px">${escapeHtml(sc.label||'Screenshot')}</div>`;

function getYouTubeId(url){
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  return m ? m[1] : null;
}

function buildTopNav(s){

function buildBottomNav(s){

    `<div class="ps-bottomnav-item ${it.active?'active':''}">
      <span class="ps-bottomnav-icon">${escapeHtml(it.icon||'•')}</span>
      <span>${escapeHtml(it.label)}</span>
    </div>`
  ).join("");
  return `<nav class="ps-bottomnav">${items}</nav>`;

function buildHero(s){
  const v = s.video || {};
  let media;

  if (v.url && (/^data:video\//i.test(v.url) || /\.(mp4|webm|ogg|mov)(\?|$)/i.test(v.url))){
    // Uploaded/direct video file — ALWAYS muted (forced)
    const attrs = [
      v.autoplay ? "autoplay" : "",
      "muted",                 // FORCED muted
      v.loop     ? "loop"     : "",
      "playsinline",
      "preload=\"auto\"",
      v.poster   ? `poster="${escapeHtml(v.poster)}"` : ""
    ].filter(Boolean).join(" ");
    media = `<video ${attrs} src="${escapeHtml(v.url)}"></video>`;
  } else if (v.poster){
    // Fallback: just the poster as a static image
    media = `<img src="${escapeHtml(v.poster)}" alt="">`;
  } else {
    media = `<div class="ps-video-placeholder">Upload a hero video or poster image</div>`;
  }

  return `<div class="ps-hero">
    ${media}
    ${v.showLabel && v.label ? `<div class="ps-video-label">${escapeHtml(v.label)}</div>` : ""}
  </div>`;
}

// Self-contained video lightbox script — same source is embedded into
// the standalone HTML export, so the modal works there too.
const VIDEO_LIGHTBOX_JS = `(function(){
  function openModal(thumb){
    var ytId    = thumb.getAttribute('data-yt-id') || '';
    var url     = thumb.getAttribute('data-video-url') || '';
    var auto    = thumb.getAttribute('data-autoplay') === '1';
    var muted   = thumb.getAttribute('data-muted') === '1';
    var loop    = thumb.getAttribute('data-loop') === '1';
    var ctrls   = thumb.getAttribute('data-controls') === '1';

    var player;
    if (ytId){
      var p = new URLSearchParams();
      if (auto)  p.set('autoplay','1');
      if (muted) p.set('mute','1');
      if (loop){ p.set('loop','1'); p.set('playlist', ytId); }
      if (!ctrls) p.set('controls','0');
      p.set('rel','0'); p.set('playsinline','1');
      var iframe = document.createElement('iframe');
      iframe.src = 'https://www.youtube.com/embed/' + ytId + '?' + p.toString();
      iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
      iframe.allowFullscreen = true;
      player = iframe;
    } else if (url && /\\.(mp4|webm|ogg|mov)(\\?|$)/i.test(url)){
      var v = document.createElement('video');
      v.src = url;
      if (ctrls) v.controls = true;
      if (auto)  v.autoplay = true;
      if (muted) v.muted = true;
      if (loop)  v.loop = true;
      v.playsInline = true;
      player = v;
    } else {
      return;
    }

    var modal = document.createElement('div');
    modal.className = 'ps-video-modal';
    modal.innerHTML = '<div class="ps-video-modal-inner"><button class="ps-video-modal-close" aria-label="Close">×</button></div>';
    modal.querySelector('.ps-video-modal-inner').appendChild(player);

    function close(){
      if (modal.parentNode) modal.parentNode.removeChild(modal);
      document.removeEventListener('keydown', onKey);
    }
    function onKey(e){ if (e.key === 'Escape') close(); }

    modal.addEventListener('click', function(e){
      if (e.target === modal) close();
    });
    modal.querySelector('.ps-video-modal-close').addEventListener('click', close);
    document.addEventListener('keydown', onKey);
    document.body.appendChild(modal);
  }

  document.addEventListener('click', function(e){
    var thumb = e.target.closest && e.target.closest('[data-ps-video="1"]');
    if (thumb) openModal(thumb);
  });
})();`;

function initVideoLightbox(){
  // Re-attach in the editor preview each render
  if (window.__lightboxInit) return;
  window.__lightboxInit = true;
  // eslint-disable-next-line no-eval
  (0,eval)(VIDEO_LIGHTBOX_JS);
}

// ===========================================================
// Screenshots carousel — pagination dots, autoplay, scroll-snap.
// Re-callable: cleans up previous instance before re-initializing.
// ===========================================================
const CAROUSEL_JS = `(function(){
  if (window.__psCarousel && window.__psCarousel.cleanup) window.__psCarousel.cleanup();

  function init(){
    var wrap  = document.querySelector('.ps-screenshots');
    var dots  = document.querySelector('.ps-dots');
    if (!wrap) return;
    var slides = Array.prototype.slice.call(wrap.querySelectorAll('.ps-screenshot'));
    if (slides.length < 2){ if (dots) dots.style.display='none'; return; }

    var autoplay   = wrap.getAttribute('data-autoplay') === '1';
    var autoplayMs = parseInt(wrap.getAttribute('data-autoplay-ms') || '4000', 10);
    var activeIdx  = 0;
    var timer      = null;
    var paused     = false;

    if (dots){
      dots.innerHTML = slides.map(function(_, i){
        return '<span class="ps-dot' + (i===0?' active':'') + '" data-idx="' + i + '"></span>';
      }).join('');
      dots.addEventListener('click', function(e){
        var idx = e.target && e.target.getAttribute('data-idx');
        if (idx == null) return;
        scrollToIdx(parseInt(idx,10));
        bumpAutoplay();
      });
    }

    function scrollToIdx(i){
      var s = slides[i]; if (!s) return;
      var left = s.offsetLeft - (wrap.clientWidth - s.clientWidth) / 2;
      wrap.scrollTo({left: Math.max(0,left), behavior:'smooth'});
    }

    function updateActive(){
      var center = wrap.scrollLeft + wrap.clientWidth/2;
      var nearest = 0, minDist = Infinity;
      for (var i=0;i<slides.length;i++){
        var s = slides[i];
        var c = s.offsetLeft + s.clientWidth/2;
        var d = Math.abs(center - c);
        if (d < minDist){ minDist = d; nearest = i; }
      }
      if (nearest !== activeIdx){
        activeIdx = nearest;
        if (dots){
          var ds = dots.querySelectorAll('.ps-dot');
          for (var j=0;j<ds.length;j++) ds[j].classList.toggle('active', j===nearest);
        }
      }
    }

    var scrollDeb;
    wrap.addEventListener('scroll', function(){
      clearTimeout(scrollDeb);
      scrollDeb = setTimeout(updateActive, 60);
    }, {passive:true});

    function next(){
      if (paused) return;
      var nextIdx = (activeIdx + 1) % slides.length;
      scrollToIdx(nextIdx);
    }
    function start(){ if (autoplay){ stop(); timer = setInterval(next, autoplayMs); } }
    function stop(){ if (timer){ clearInterval(timer); timer = null; } }
    function bumpAutoplay(){ stop(); setTimeout(start, 5000); }

    // Pause autoplay during user interaction
    wrap.addEventListener('touchstart',  function(){ paused = true;  stop(); }, {passive:true});
    wrap.addEventListener('touchend',    function(){ paused = false; bumpAutoplay(); }, {passive:true});
    wrap.addEventListener('mousedown',   function(){ paused = true;  stop(); });
    wrap.addEventListener('mouseup',     function(){ paused = false; bumpAutoplay(); });
    wrap.addEventListener('mouseenter',  function(){ stop(); });
    wrap.addEventListener('mouseleave',  function(){ start(); });

    start();

    window.__psCarousel = {
      cleanup: function(){ stop(); }
    };
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    setTimeout(init, 30);  // wait for layout
  }
})();`;

function initCarousel(){
  // eslint-disable-next-line no-eval
  (0,eval)(CAROUSEL_JS);
}

// ===========================================================
// Install button progress animation — runs 0%→100% then redirects.
// The actual redirect URL/logic comes from the install script that runs after.
// We expose `window.__psInstallProgress(btn, ms, label, done)`.
// ===========================================================
const INSTALL_PROGRESS_JS = `(function(){
  window.__psInstallProgress = function(btn, ms, label, done){
    if (!btn || btn.dataset.installing === '1'){ if (done) done(); return; }
    btn.dataset.installing = '1';
    var fill = btn.querySelector('.ps-install-progress');
    var text = btn.querySelector('.ps-install-text');
    var original = text ? text.textContent : '';
    var start = performance.now();
    function tick(now){
      var t = Math.min(1, (now - start) / ms);
      var pct = Math.floor(t * 100);
      if (fill) fill.style.width = pct + '%';
      if (text) text.textContent = (label ? label + ' ' : original + ' ') + pct + '%';
      if (t < 1){ requestAnimationFrame(tick); }
      else { if (done) done(); }
    }
    requestAnimationFrame(tick);
  };
})();`;

function renderPreview(){
  $("#preview").innerHTML = buildPreviewHTML(state, false);
  updateExportBadge();
  initVideoLightbox();
  initCarousel();
}

/* ===========================================================
   8. Pages CMS — list / save / load / delete
   ===========================================================
   Pages are stored in localStorage under PageStore.KEY. Each page is:
     { id, name, state, html, updatedAt, createdAt }
   To wire this UI into a real backend later, swap PageStore methods
   with fetch() calls — interface is intentionally minimal.
   =========================================================== */
const PageStore = {
  KEY: "ps_generator_pages_v1",
  list(){
    try { return JSON.parse(localStorage.getItem(this.KEY) || "[]"); }
    catch(_){ return []; }
  },
  _save(arr){ localStorage.setItem(this.KEY, JSON.stringify(arr)); },
  get(id){ return this.list().find(p => p.id === id) || null; },
  create(page){
    const all = this.list();
    page.id = "pg_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    page.createdAt = new Date().toISOString();
    page.updatedAt = page.createdAt;
    all.unshift(page);
    this._save(all);
    return page;
  },
  update(id, partial){
    const all = this.list();
    const i = all.findIndex(p => p.id === id);
    if (i < 0) return null;
    all[i] = { ...all[i], ...partial, updatedAt: new Date().toISOString() };
    this._save(all);
    return all[i];
  },
  delete(id){
    this._save(this.list().filter(p => p.id !== id));
  },
  duplicate(id){
    const src = this.get(id); if (!src) return null;
    return this.create({
      name: src.name + " (copy)",
      state: JSON.parse(JSON.stringify(src.state)),
      html:  src.html
    });
  }
};

let currentView    = "list";     // "list" | "editor"
let currentPageId  = null;       // null when creating new
let currentPageName = "";

function showView(view){
  currentView = view;
  $("#topbar").innerHTML = renderTopbar();
  $("#pages-view").style.display   = view === "list"   ? "" : "none";
  $("#editor-view").style.display  = view === "editor" ? "grid" : "none";
  if (view === "list")  renderPagesList();
  if (view === "editor"){ renderEditor(); renderPreview(); }
  attachTopbarEvents();
}

function renderTopbar(){
  if (currentView === "list"){
    return `
      <h1>📄 Landing Page Templates</h1>
      <span class="badge">${PageStore.list().length} pages</span>
      <div style="flex:1"></div>
      <a class="btn" href="./">Tool directory</a>
      <button class="btn btn-primary" id="btn-new-page">+ New page</button>
    `;
  }
  // editor view
  return `
    <button class="btn" id="btn-back">← Pages</button>
    <input class="page-name-input" id="page-name-input" value="${escapeHtml(currentPageName)}" placeholder="Untitled page">
    <span class="badge" id="page-id-badge" style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace">${currentPageId || "unsaved"}</span>
    <div style="flex:1"></div>
    <span id="export-mode-badge" style="font-size:11px;color:var(--muted)"></span>
    <a class="btn" href="./">Tool directory</a>
    <button class="btn" id="btn-reset">Reset</button>
    <button class="btn btn-primary" id="btn-save">💾 Save${currentPageId ? "" : " as new"}</button>
  `;
}

function attachTopbarEvents(){
  // List view
  if ($("#btn-new-page")){
    $("#btn-new-page").addEventListener("click", openNewPage);
  }
  // Editor view
  if ($("#btn-back")){
    $("#btn-back").addEventListener("click", ()=>{
      if (hasUnsavedChanges() && !confirm("You may have unsaved changes. Leave anyway?")) return;
      showView("list");
    });
  }
  if ($("#page-name-input")){
    $("#page-name-input").addEventListener("input", e=>{
      currentPageName = e.target.value;
    });
  }
  if ($("#btn-reset")){
    $("#btn-reset").addEventListener("click", ()=>{
      if (!confirm("Reset to the default page content? All current edits will be lost.")) return;
      const apiKey = state.ai.apiKey;
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      state.ai.apiKey = apiKey;
      renderEditor(); renderPreview();
      showToast("Reset to defaults");
    });
  }
  if ($("#btn-save")){
    $("#btn-save").addEventListener("click", savePage);
  }
}

function openNewPage(){
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  currentPageId = null;
  currentPageName = "Untitled page";
  showView("editor");
}

function loadPage(id){
  const p = PageStore.get(id);
  if (!p){ showToast("Page not found"); return; }
  // Merge with DEFAULT_STATE to fill any missing new fields
  state = deepMerge(JSON.parse(JSON.stringify(DEFAULT_STATE)), p.state || {});
  currentPageId = p.id;
  currentPageName = p.name || "Untitled";
  showView("editor");
}

function savePage(){
  const cleanState = JSON.parse(JSON.stringify(state));
  if (cleanState.ai) delete cleanState.ai.apiKey;   // never persist API key
  const html = buildStandaloneHTML(state);
  const name = (currentPageName || "Untitled page").trim();

  if (currentPageId){
    PageStore.update(currentPageId, { name, state: cleanState, html });
    showToast("Saved");
  } else {
    const created = PageStore.create({ name, state: cleanState, html });
    currentPageId = created.id;
    showToast("Page created");
  }
  // Refresh badge to show new id
  $("#topbar").innerHTML = renderTopbar();
  attachTopbarEvents();
  updateExportBadge();
}

function hasUnsavedChanges(){
  if (!currentPageId) return true;  // new page = always unsaved
  const saved = PageStore.get(currentPageId);
  if (!saved) return true;
  const cur = JSON.parse(JSON.stringify(state));
  if (cur.ai) delete cur.ai.apiKey;
  return JSON.stringify(saved.state) !== JSON.stringify(cur);
}

function renderPagesList(){
  const all = PageStore.list();
  const search = ($("#pages-search")?.value || "").toLowerCase();
  const filtered = search
    ? all.filter(p => (p.name || "").toLowerCase().includes(search) || (p.id || "").toLowerCase().includes(search))
    : all;

  $("#pages-count").textContent = all.length === 0 ? "" : `${filtered.length} of ${all.length}`;

  const container = $("#pages-list-container");
  if (all.length === 0){
    container.innerHTML = `
      <div class="pages-empty">
        <h2>No pages yet</h2>
        <p>Click <strong>+ New page</strong> in the top right to create your first landing page template.</p>
        <p style="font-size:12px;margin-top:18px">Saved pages are stored in this browser (localStorage).<br>To wire up to your BO backend, swap the <code>PageStore</code> methods in the source.</p>
      </div>
    `;
    return;
  }

  container.innerHTML = `<div class="pages-grid">${filtered.map(p=>{
    const tplMeta  = TEMPLATE_META[p.state?.template] || TEMPLATE_META.screenshots;
    const tplIcon  = tplMeta.icon;
    const tplLabel = tplMeta.label;
    const updated  = formatRelative(p.updatedAt);
    const appName  = p.state?.app?.name || "Untitled app";
    return `
      <div class="page-card" data-page-id="${p.id}">
        <div class="page-card-head">
          <div class="page-card-icon">${tplIcon}</div>
          <div style="flex:1;min-width:0">
            <div class="page-card-title">${escapeHtml(p.name)}</div>
            <div class="page-card-meta">${escapeHtml(appName)} · ${tplLabel}</div>
          </div>
        </div>
        <div class="page-card-meta">Updated ${updated}</div>
        <div class="page-card-id">${p.id}</div>
        <div class="page-card-actions">
          <button class="btn btn-sm" data-act="edit" data-id="${p.id}">Edit</button>
          <button class="btn btn-sm" data-act="duplicate" data-id="${p.id}">Duplicate</button>
          <button class="btn btn-sm" data-act="copy-id" data-id="${p.id}">Copy ID</button>
          <button class="btn btn-sm" data-act="download" data-id="${p.id}">Download HTML</button>
          <button class="btn btn-sm btn-danger" data-act="delete" data-id="${p.id}" style="margin-left:auto">Delete</button>
        </div>
      </div>
    `;
  }).join("")}</div>`;

  // Card-level click → edit
  container.querySelectorAll(".page-card").forEach(card=>{
    card.addEventListener("click", e=>{
      if (e.target.closest("[data-act]")) return;  // let action buttons fire their own
      loadPage(card.getAttribute("data-page-id"));
    });
  });

  // Action buttons
  container.querySelectorAll("[data-act]").forEach(btn=>{
    btn.addEventListener("click", e=>{
      e.stopPropagation();
      const id  = btn.getAttribute("data-id");
      const act = btn.getAttribute("data-act");
      if (act === "edit") loadPage(id);
      if (act === "duplicate"){
        PageStore.duplicate(id);
        renderPagesList(); showToast("Duplicated");
      }
      if (act === "copy-id"){
        navigator.clipboard?.writeText(id);
        showToast("ID copied");
      }
      if (act === "download"){
        const p = PageStore.get(id); if (!p) return;
        const blob = new Blob([p.html || buildStandaloneHTML(deepMerge(JSON.parse(JSON.stringify(DEFAULT_STATE)), p.state))], {type:"text/html"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${(p.name||"page").replace(/\s+/g,"-").toLowerCase()}-skin.html`;
        a.click();
      }
      if (act === "delete"){
        if (!confirm(`Delete page "${PageStore.get(id)?.name}"?\nThis cannot be undone.`)) return;
        PageStore.delete(id);
        renderPagesList(); showToast("Deleted");
        // Refresh count badge in topbar
        $("#topbar").innerHTML = renderTopbar();
        attachTopbarEvents();
      }
    });
  });
}

function formatRelative(iso){
  if (!iso) return "—";
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60)        return "just now";
  if (diff < 3600)      return Math.floor(diff/60) + "m ago";
  if (diff < 86400)     return Math.floor(diff/3600) + "h ago";
  if (diff < 86400*7)   return Math.floor(diff/86400) + "d ago";
  return d.toLocaleDateString();
}

// Search filter
document.addEventListener("input", e=>{
  if (e.target && e.target.id === "pages-search") renderPagesList();
});

function deepMerge(target, source){
  if (Array.isArray(source)) return source;
  if (source && typeof source === "object"){
    const out = { ...target };
    for (const k of Object.keys(source)){
      out[k] = (k in target) ? deepMerge(target[k], source[k]) : source[k];
    }
    return out;
  }
  return source;
}

function getHtmlLang(s){
  return String(s.locale?.locale || "en").split(/[-_]/)[0] || "en";
}

function buildStandaloneHTML(s){
  // Full-bleed body for standalone — sticky top/bottom nav stick to actual viewport,
  // matching how the real Play Store mobile H5 page works.
  const css = `
    *{box-sizing:border-box}
    body{margin:0;background:#fff;font-family:"Google Sans","Roboto","PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:#202124;min-height:100vh}
    .ps{max-width:none}
  ` + getPreviewCSS();
  return `<!doctype html>
<html lang="${escapeHtml(getHtmlLang(s))}">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>${escapeHtml(s.app.name)} — ${escapeHtml((s.ui && s.ui.appInfoTitle) || DEFAULT_STATE.ui.appInfoTitle)}</title>
<meta name="theme-color" content="${escapeHtml(s.theme.primary)}">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>${css}</style>
</head>
<body>
<div class="ps">${buildPreviewHTML(s, true)}</div>
<script>${CAROUSEL_JS}<\/script>
<script>${INSTALL_PROGRESS_JS}<\/script>
${buildExternalActionScript()}
</body>
</html>`;
}

function buildExternalActionScript(){
  return `<!-- Skin-only button bridge.
External modules own install/ad attribution and can resolve a URL by defining:
  window.LP_LINK_RESOLVER = async function(action, button){ return "https://..."; }
or:
  window.LP_LINKS = { install: "https://..." }
If no URL is returned, this template dispatches a cancelable "lp:action" event.
-->
<script>
(function(){
  var btn = document.getElementById('ps-install-btn');
  if (!btn) return;

  function runProgress(done){
    var hasProgress = btn.getAttribute('data-progress') === '1';
    var ms = parseInt(btn.getAttribute('data-progress-ms') || '0', 10);
    var label = btn.getAttribute('data-progress-text') || '';
    if (hasProgress && ms > 0 && window.__psInstallProgress){
      window.__psInstallProgress(btn, ms, label, done);
    } else {
      done();
    }
  }

  function openUrl(url){
    if (url && url !== '#') window.location.href = url;
  }

  btn.addEventListener('click', function(e){
    e.preventDefault();
    var action = btn.getAttribute('data-lp-action') || 'install';
    runProgress(function(){
      try {
        var result = null;
        if (typeof window.LP_LINK_RESOLVER === 'function'){
          result = window.LP_LINK_RESOLVER(action, btn);
        } else if (window.LP_LINKS && window.LP_LINKS[action]){
          result = window.LP_LINKS[action];
        }
        if (result && typeof result.then === 'function'){
          result.then(openUrl).catch(function(){});
        } else if (result) {
          openUrl(result);
        } else {
          window.dispatchEvent(new CustomEvent('lp:action', { detail: { action: action, button: btn } }));
        }
      } catch (_) {
        window.dispatchEvent(new CustomEvent('lp:action', { detail: { action: action, button: btn } }));
      }
    });
  });
})();
<\/script>`;
}

function getPreviewCSS(){
  // pull the .ps* rules out of this generator's stylesheet
  const sheet = [...document.styleSheets].find(ss=>{
    try { return ss.cssRules && [...ss.cssRules].some(r=>r.selectorText && r.selectorText.includes(".ps")); }
    catch(e){ return false; }
  });
  if (!sheet) return "";
  return [...sheet.cssRules]
    .filter(r=>r.cssText && (
      r.cssText.startsWith(".ps") || r.cssText.startsWith(":root") ||
      r.cssText.includes(".ps ")  || r.cssText.includes(".ps-")
    ))
    .map(r=>r.cssText).join("\n");
}

/* ===========================================================
   9. Boot — start at the Pages list
   =========================================================== */
showView("list");
</script>
