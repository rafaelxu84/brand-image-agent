<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brand Image Agent</title>
    <link rel="stylesheet" href="./styles.css?v=20260602-1" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="panel controls" aria-label="Controls">
          <div class="brand-block">
            <p class="eyebrow">Brand Image Agent</p>
            <h1>Logo batch composer</h1>
            <nav class="tool-switcher" aria-label="Online image agent entrances">
              <a href="./" class="active">Live / logo batch <span>Instant</span></a>
              <a href="./hosted.html">Slow online batch <span>Offline</span></a>
            </nav>
          </div>

          <label class="field">
            <span>Brand name</span>
            <input id="brandName" type="text" placeholder="Pragmatic Play" autocomplete="off" />
          </label>

          <label class="dropzone" id="imageDrop">
            <input id="imageInput" type="file" accept="image/*" multiple />
            <span>Upload cover images</span>
            <strong id="imageCount">No images selected</strong>
          </label>

          <div class="grid-two">
            <label class="field">
              <span>Export width</span>
              <input id="exportWidth" type="number" min="400" max="400" value="400" disabled />
            </label>
            <label class="field">
              <span>Lower mask px</span>
              <input id="footerRatio" type="number" min="116" max="116" value="116" disabled />
            </label>
          </div>

          <label class="field">
            <span>AI quality</span>
            <select id="aiQuality">
              <option value="medium" selected>Medium - balanced</option>
              <option value="low">Low - draft batch</option>
              <option value="high">High - final only</option>
            </select>
          </label>

          <label class="field">
            <span>AI instructions</span>
            <textarea id="instructions" rows="4" placeholder="Keep the dragon larger, make the bottom area warmer, preserve all title text."></textarea>
          </label>

          <label class="field">
            <span>OpenAI API key (optional)</span>
            <input id="apiKey" type="password" placeholder="Server key is configured" autocomplete="off" />
          </label>

          <div class="logo-tools" aria-label="Logo placement">
            <p class="label">Logo overlay</p>
            <label class="dropzone compact" id="logoDrop">
              <input id="logoInput" type="file" accept="image/*" />
              <span>Upload transparent logo (PNG/WebP alpha preserved)</span>
              <strong id="logoName">No logo selected</strong>
            </label>
            <p class="helper">Adjust the logo on the preview, then apply that exact placement to every uploaded cover.</p>
            <label class="check-field">
              <input id="removeLogoWhite" type="checkbox" />
              <span>Remove logo background from edges</span>
            </label>
            <label class="field range-field">
              <span>Background tolerance <strong id="logoBgToleranceValue">48</strong></span>
              <input id="logoBgTolerance" type="range" min="10" max="110" value="48" />
            </label>
            <label class="field range-field">
              <span>Logo X <strong id="logoXValue">40px</strong></span>
              <input id="logoX" type="range" min="0" max="400" value="40" />
            </label>
            <label class="field range-field">
              <span>Logo Y <strong id="logoYValue">430px</strong></span>
              <input id="logoY" type="range" min="0" max="533" value="430" />
            </label>
            <label class="field range-field">
              <span>Logo height <strong id="logoHeightValue">70px</strong></span>
              <input id="logoHeight" type="range" min="20" max="180" value="70" />
            </label>
            <label class="field range-field">
              <span>Opacity <strong id="logoOpacityValue">100%</strong></span>
              <input id="logoOpacity" type="range" min="20" max="100" value="100" />
            </label>
            <button id="applyLogoBatchBtn" type="button" disabled>Apply logo to all uploaded images</button>
            <button id="downloadPressedLogoZipBtn" type="button" class="ghost" disabled>Download pressed-logo ZIP</button>
          </div>

          <div class="actions">
            <button id="canvasBtn" type="button">Expand selected</button>
            <button id="batchBtn" type="button" class="secondary">Expand all</button>
            <button id="aiBtn" type="button" class="secondary">AI cover selected</button>
            <button id="aiBatchBtn" type="button" class="secondary">AI cover all</button>
          </div>

          <p class="status" id="status">Ready.</p>
        </aside>

        <section class="stage" aria-label="Generated images">
          <div class="toolbar">
            <div>
              <strong id="selectedTitle">No image selected</strong>
              <span id="selectedMeta">Upload assets to begin.</span>
            </div>
            <button id="downloadAllBtn" type="button" class="ghost" disabled>Download ZIP</button>
          </div>

          <div class="preview-grid">
            <div class="preview-column">
              <p class="label">Source</p>
              <div class="image-frame">
                <img id="sourcePreview" alt="" />
              </div>
            </div>
            <div class="preview-column">
              <p class="label">Generated</p>
              <div class="image-frame portrait">
                <canvas id="previewCanvas" width="400" height="533"></canvas>
                <img id="aiPreview" alt="" hidden />
                <img id="logoOverlay" class="logo-overlay" alt="" hidden />
              </div>
            </div>
          </div>

          <div class="results" id="results" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script src="./app.js?v=20260609-1" type="module"></script>
  </body>
</html>
