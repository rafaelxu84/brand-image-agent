name: Hosted batch collector

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Poll hosted batch collector
        run: |
          for i in 1 2 3; do
            curl -fsS "https://brand-image-agent.vercel.app/api/hosted-cron?limit=8&secret=${{ secrets.HOSTED_CRON_SECRET }}"
            echo
          done
